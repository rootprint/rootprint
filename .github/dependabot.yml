version: 2
updates:
  - package-ecosystem: bun
    directory: '/'
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        patterns: ['*']
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ['*']
        update-types: [minor, patch]

  # Dockerfile base image
  - package-ecosystem: docker
    directory: '/'
    schedule:
      interval: weekly
