name: Feature request
description: Suggest an improvement to Logwiz
title: '[Feature]: '
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Use this template for focused feature requests.

        If the change is large or exploratory, opening a discussion or issue with problem context first is usually the fastest path.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What workflow is missing or painful today?
      placeholder: Describe the user problem, not just the proposed solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Logwiz to do?
      placeholder: Describe the change you want to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or other approaches did you consider?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, examples, links, or implementation notes.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and pull requests.
          required: true
        - label: This request is scoped to a single problem or workflow.
          required: true
