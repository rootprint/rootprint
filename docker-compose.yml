services:
  db:
    image: postgres:17
    container_name: logwiz-postgres
    restart: always
    environment:
      - POSTGRES_USER=logwiz
      - POSTGRES_PASSWORD=logwiz
      - POSTGRES_DB=logwiz
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  quickwit:
    image: quickwit/quickwit:edge
    container_name: quickwit
    ports:
      - "127.0.0.1:7280:7280" # REST API + Web UI (local only)
      - "127.0.0.1:7281:7281" # gRPC (local only)
    volumes:
      - ./quickwit.yaml:/quickwit/config/quickwit.yaml:ro
      - ./.quickwit/qwdata:/quickwit/qwdata
    command: ["run"]
    healthcheck:
      test: ["CMD-SHELL", 'bash -c "echo > /dev/tcp/localhost/7280"']
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
