services:
  quickwit:
    image: quickwit/quickwit:edge
    container_name: quickwit
    ports:
      - '7280:7280' # REST API + Web UI
      - '7281:7281' # gRPC
    volumes:
      - ./quickwit.yaml:/quickwit/config/quickwit.yaml:ro
      - ./.quickwit/qwdata:/quickwit/qwdata
    command: ['run']
    healthcheck:
      test: ['CMD-SHELL', 'bash -c "echo > /dev/tcp/localhost/7280"']
      interval: 10s
      timeout: 5s
      retries: 10

  logwiz:
    build: .
    container_name: logwiz
    depends_on:
      quickwit:
        condition: service_healthy
    environment:
      ORIGIN: ${ORIGIN:-http://localhost:3000}
      LOGWIZ_QUICKWIT_URL: http://quickwit:7280/api/v1
      LOGWIZ_DATABASE_PATH: /app/data/logwiz.db
    ports:
      - '3000:3000'
    volumes:
      - logwiz-data:/app/data

volumes:
  logwiz-data:
