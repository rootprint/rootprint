services:
  quickwit:
    image: quickwit/quickwit@sha256:7297db3d2fffdea817e8b6a0c293d41dc5cb78bcc4672136bc5b6c30460c4429
    container_name: quickwit
    ports:
      - '127.0.0.1:7280:7280' # REST API + Web UI (local only)
      - '127.0.0.1:7281:7281' # gRPC (local only)
    volumes:
      - ./quickwit.yaml:/quickwit/config/quickwit.yaml:ro
      - ./.quickwit/qwdata:/quickwit/qwdata
    command: ['run']
    healthcheck:
      test: ['CMD-SHELL', 'bash -c "echo > /dev/tcp/localhost/7280"']
      interval: 10s
      timeout: 5s
      retries: 10

  logwiz:
    build: .
    container_name: logwiz
    depends_on:
      quickwit:
        condition: service_healthy
    environment:
      LOGWIZ_QUICKWIT_URL: http://quickwit:7280/api/v1
      LOGWIZ_DATABASE_PATH: /app/data/logwiz.db
      LOGWIZ_ADMIN_USERNAME: logwiz
      LOGWIZ_ADMIN_PASSWORD: logwiz
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'bun -e "fetch(''http://localhost:3000/api/health'').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"'
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - '3000:3000'
    volumes:
      - logwiz-data:/app/data

volumes:
  logwiz-data:
